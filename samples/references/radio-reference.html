<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1717cf",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111121",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .radio-custom:checked {
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3ccircle cx='8' cy='8' r='3'/%3e%3c/svg%3e");
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 py-4 lg:px-40 bg-white dark:bg-slate-900/50">
<div class="flex items-center gap-4">
<div class="text-primary">
<span class="material-symbols-outlined text-3xl">settings</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">System Settings</h2>
</div>
<div class="flex gap-3">
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-200 transition-colors">
<span class="material-symbols-outlined text-xl">notifications</span>
</button>
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-200 transition-colors">
<span class="material-symbols-outlined text-xl">account_circle</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="px-6 lg:px-40 flex flex-1 justify-center py-10">
<div class="layout-content-container flex flex-col max-w-[640px] flex-1">
<!-- Title Section -->
<div class="flex flex-col gap-2 mb-8">
<p class="text-slate-900 dark:text-slate-100 text-3xl lg:text-4xl font-bold leading-tight">Notification Preference</p>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal">Select how you would like to receive updates about your account activity and security alerts.</p>
</div>
<!-- Radio Group Card Layout -->
<div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden shadow-sm">
<div class="flex flex-col divide-y divide-slate-100 dark:divide-slate-800">
<!-- Option 1: Unselected -->
<label class="flex items-start gap-4 p-5 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<div class="pt-0.5">
<input class="radio-custom h-5 w-5 border-2 border-slate-300 dark:border-slate-600 bg-transparent text-primary checked:border-primary checked:bg-primary focus:ring-primary focus:ring-offset-0" name="preference" type="radio"/>
</div>
<div class="flex flex-col">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Email Summary</span>
<span class="text-slate-500 dark:text-slate-400 text-sm">Receive a daily digest of all your activity and notifications.</span>
</div>
</label>
<!-- Option 2: Selected State -->
<label class="flex items-start gap-4 p-5 cursor-pointer bg-primary/5 dark:bg-primary/10 hover:bg-primary/10 transition-colors">
<div class="pt-0.5">
<input checked="" class="radio-custom h-5 w-5 border-2 border-slate-300 dark:border-slate-600 bg-transparent text-primary checked:border-primary checked:bg-primary focus:ring-primary focus:ring-offset-0" name="preference" type="radio"/>
</div>
<div class="flex flex-col">
<div class="flex items-center gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Real-time Push</span>
<span class="px-2 py-0.5 rounded-full text-[10px] font-bold bg-primary text-white uppercase tracking-wider">Recommended</span>
</div>
<span class="text-slate-500 dark:text-slate-400 text-sm">Get instant notifications on your mobile device for every action.</span>
</div>
</label>
<!-- Option 3: Unselected -->
<label class="flex items-start gap-4 p-5 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<div class="pt-0.5">
<input class="radio-custom h-5 w-5 border-2 border-slate-300 dark:border-slate-600 bg-transparent text-primary checked:border-primary checked:bg-primary focus:ring-primary focus:ring-offset-0" name="preference" type="radio"/>
</div>
<div class="flex flex-col">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold">SMS Alerts</span>
<span class="text-slate-500 dark:text-slate-400 text-sm">Basic text messages for critical security events only.</span>
</div>
</label>
<!-- Option 4: Disabled State -->
<label class="flex items-start gap-4 p-5 opacity-50 cursor-not-allowed bg-slate-50 dark:bg-slate-900">
<div class="pt-0.5">
<input class="radio-custom h-5 w-5 border-2 border-slate-200 dark:border-slate-700 bg-transparent text-slate-300 focus:ring-0" disabled="" name="preference" type="radio"/>
</div>
<div class="flex flex-col">
<div class="flex items-center gap-2">
<span class="text-slate-400 dark:text-slate-500 text-sm font-semibold">Phone Call</span>
<span class="material-symbols-outlined text-sm text-slate-400">lock</span>
</div>
<span class="text-slate-400 dark:text-slate-500 text-sm">Available only for Enterprise customers.</span>
</div>
</label>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row justify-end gap-3 mt-8">
<button class="flex min-w-[100px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-11 px-6 bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-slate-100 text-sm font-bold transition-all hover:bg-slate-300 dark:hover:bg-slate-700">
<span>Cancel</span>
</button>
<button class="flex min-w-[140px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-11 px-6 bg-primary text-white text-sm font-bold shadow-lg shadow-primary/20 transition-all hover:brightness-110 active:scale-95">
<span>Save Preferences</span>
</button>
</div>
<!-- Helper Footer -->
<div class="mt-12 flex items-center justify-center gap-2 text-slate-400 text-xs">
<span class="material-symbols-outlined text-sm">info</span>
<span>You can change these settings at any time in your profile.</span>
</div>
</div>
</main>
</div>
</div>
</body></html>
